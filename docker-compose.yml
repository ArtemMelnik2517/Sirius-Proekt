version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: sirius
      POSTGRES_PASSWORD: siriuspass
      POSTGRES_DB: siriusdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sirius -d siriusdb"]
      interval: 5s
      timeout: 5s
      retries: 5
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://sirius:siriuspass@db:5432/siriusdb
      - SECRET_KEY=${SECRET_KEY}
      - PYTHONUNBUFFERED=1  # Добавь эту строчку
volumes:
  pgdata:
